name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "editor/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - "CHANGELOG.md"
      - ".github/copilot-instructions.md"
      - ".github/lang-summary.md"
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - "editor/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - "CHANGELOG.md"
      - ".github/copilot-instructions.md"
      - ".github/lang-summary.md"

jobs:
  prepare-boost:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Restore Boost cache
      id: boost-cache
      uses: actions/cache/restore@v5
      with:
        path: third_party/boost
        key: ${{ runner.os }}-boost-1.90.0-${{ hashFiles('tools/boost-install.sh') }}

    - name: Install Boost source tree (cache miss)
      if: steps.boost-cache.outputs.cache-hit != 'true'
      run: bash tools/boost-install.sh third_party/boost

    - name: Save Boost cache
      if: steps.boost-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: third_party/boost
        key: ${{ runner.os }}-boost-1.90.0-${{ hashFiles('tools/boost-install.sh') }}

    - name: Upload Boost artifact
      uses: actions/upload-artifact@v6
      with:
        name: boost-source-${{ github.run_id }}
        path: third_party/boost
        if-no-files-found: error
        retention-days: 1

  native:
    needs: prepare-boost
    timeout-minutes: 20
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        build_type: [Debug]
        toolchain: [gcc, clang-libstdc++, clang-libc++, clang-coverage]
        include:
          - toolchain: gcc
            compiler: gcc
            c_compiler: gcc-13
            cpp_compiler: g++-13
            stdlib: libstdc++
            stdlib_package: libstdc++-13-dev
            run_coverage: false
          - toolchain: clang-libstdc++
            compiler: clang
            c_compiler: clang-20
            cpp_compiler: clang++-20
            stdlib: libstdc++
            stdlib_package: libstdc++-13-dev
            run_coverage: false
          - toolchain: clang-libc++
            compiler: clang
            c_compiler: clang-20
            cpp_compiler: clang++-20
            stdlib: libc++
            stdlib_package: libc++-20-dev
            run_coverage: false
          - toolchain: clang-coverage
            compiler: clang
            c_compiler: clang-20
            cpp_compiler: clang++-20
            stdlib: libstdc++
            stdlib_package: libstdc++-13-dev
            extra_package: llvm-20
            run_coverage: true

    steps:
    - uses: actions/checkout@v5
      with:
        submodules: true

    - name: Dump info
      run: |
        printf "Workspace:   ${{ github.workspace }}\n"
        printf "Running on:  ${{ runner.os }}\n"
        printf "Mode:        %s\n" "${{ matrix.toolchain }}"
        printf "Compilers:   ${{ matrix.compiler }} / ${{ matrix.c_compiler }} / ${{ matrix.cpp_compiler }}\n"
        printf "Library:     ${{ matrix.stdlib }} / ${{ matrix.stdlib_package }}\n"
        printf "Extra dep:   %s\n" "${{ matrix.extra_package }}"

    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        missing_packages=()
        required_packages=("${{ matrix.c_compiler }}" "${{ matrix.stdlib_package }}")
        if [[ -n "${{ matrix.extra_package }}" ]]; then
          required_packages+=("${{ matrix.extra_package }}")
        fi
        for package in "${required_packages[@]}"; do
          if ! dpkg -s "$package" >/dev/null 2>&1; then
            missing_packages+=("$package")
          fi
        done

        if [[ ${#missing_packages[@]} -gt 0 ]]; then
          sudo apt update
          sudo apt install -y "${missing_packages[@]}"
        else
          echo "All required packages are already installed."
        fi

    - name: Restore Boost cache
      if: runner.os == 'Linux'
      id: boost-cache
      uses: actions/cache/restore@v5
      with:
        path: third_party/boost
        key: ${{ runner.os }}-boost-1.90.0-${{ hashFiles('tools/boost-install.sh') }}

    - name: Download Boost artifact (cache miss)
      if: runner.os == 'Linux' && steps.boost-cache.outputs.cache-hit != 'true'
      uses: actions/download-artifact@v6
      with:
        name: boost-source-${{ github.run_id }}
        path: ${{ github.workspace }}

    - name: Normalize Boost artifact path (cache miss)
      if: runner.os == 'Linux' && steps.boost-cache.outputs.cache-hit != 'true'
      run: |
        if [[ -d "${{ github.workspace }}/boost" && ! -d "${{ github.workspace }}/third_party/boost" ]]; then
          mkdir -p "${{ github.workspace }}/third_party"
          mv "${{ github.workspace }}/boost" "${{ github.workspace }}/third_party/boost"
        fi

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
        echo "workspace_forward=$(echo '${{ github.workspace }}' | sed 's|\\|/|g')" >> "$GITHUB_OUTPUT"

    - name: Configure CMake (Linux/macOS)
      if: runner.os != 'Windows' && matrix.run_coverage != true
      run: |
        COMPILER_FLAGS=""
        LINKER_FLAGS=""
        if [[ "${{ matrix.compiler }}" == "clang" && "${{ matrix.stdlib }}" == "libc++" ]]; then
          COMPILER_FLAGS="-stdlib=libc++"
          LINKER_FLAGS="-stdlib=libc++ -lc++ -lc++abi"
        fi

        cmake -B ${{ steps.strings.outputs.build-output-dir }} \
        -DCMAKE_COMPILE_WARNING_AS_ERROR=ON \
        -DCMAKE_COLOR_DIAGNOSTICS=ON \
        -DCMAKE_CXX_FLAGS="-fdiagnostics-color=always $COMPILER_FLAGS" \
        -DCMAKE_CXX_LINK_FLAGS="$LINKER_FLAGS" \
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }} \
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
        -S ${{ github.workspace }}

    - name: Build
      if: matrix.run_coverage != true
      run: >
        cmake --build ${{ steps.strings.outputs.build-output-dir }}
        --config ${{ matrix.build_type }}
        --verbose

    - name: Test
      if: matrix.run_coverage != true
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --output-on-failure --build-config ${{ matrix.build_type }}
      timeout-minutes: 5

    - name: Generate LLVM LCOV (self-contained)
      if: matrix.run_coverage
      run: bash tools/coverage-llvm.sh

    - name: Upload Codecov report
      if: matrix.run_coverage
      uses: codecov/codecov-action@v5
      with:
        files: ./build/clang20-coverage/coverage/lcov.info
        flags: native
        name: native-llvm-coverage
        use_oidc: true
        fail_ci_if_error: true

    - name: Upload coverage artifacts
      if: always() && matrix.run_coverage
      uses: actions/upload-artifact@v6
      with:
        name: llvm-coverage-${{ github.sha }}
        path: |
          build/clang20-coverage/coverage/lcov.info
          build/clang20-coverage/coverage/coverage.profdata
        retention-days: 30

  node:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        build_type: [Debug, Release]

    steps:
    - uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'

    - name: Restore Emscripten cache
      id: emsdk-cache
      uses: actions/cache/restore@v5
      with:
        # Cache the full emsdk directory, which holds the installed toolchain,
        # emsdk_env.sh, and all activation state needed by later steps.
        # The key includes the OS and a hash of this workflow file so the cache
        # is invalidated whenever the Emscripten install command or version changes.
        path: ${{ github.workspace }}/emsdk
        key: ${{ runner.os }}-emsdk-latest-${{ hashFiles('.github/workflows/cmake-multi-platform.yml') }}

    - name: Install emscripten
      if: steps.emsdk-cache.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/emscripten-core/emsdk.git "${{ github.workspace }}/emsdk"
        cd "${{ github.workspace }}/emsdk"
        ./emsdk install latest
        ./emsdk activate latest

    - name: Save Emscripten cache
      if: steps.emsdk-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: ${{ github.workspace }}/emsdk
        key: ${{ runner.os }}-emsdk-latest-${{ hashFiles('.github/workflows/cmake-multi-platform.yml') }}

    - name: Install dependencies
      run: |
        npm ci
      working-directory: bindings/node

    - name: Install VS Code extension dependencies
      run: |
        npm ci
      working-directory: editor/vscode

    - name: Lint
      run: >
        npx eslint src
        --max-warnings=0
        --color
      working-directory: bindings/node

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build_dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
        echo "emsdk_dir=${{ github.workspace }}/emsdk" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      run: |
        source "${{ steps.strings.outputs.emsdk_dir }}/emsdk_env.sh"
        cmake -B "${{ steps.strings.outputs.build_dir }}" \
        -DCMAKE_TOOLCHAIN_FILE="${{ steps.strings.outputs.emsdk_dir }}/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake" \
        -DCMAKE_COMPILE_WARNING_AS_ERROR=ON \
        -DCMAKE_COLOR_DIAGNOSTICS=ON \
        -DCMAKE_CXX_FLAGS="-fdiagnostics-color=always" \
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
        -S ${{ github.workspace }}

    - name: Build
      run: |
        source "${{ steps.strings.outputs.emsdk_dir }}/emsdk_env.sh"
        cmake \
          --build "${{ steps.strings.outputs.build_dir }}" \
          --target cowel-npm cowel-lsp-wasm \
          --config ${{ matrix.build_type }} \
          --verbose

    - name: Build VS Code extension
      run: npm run build
      working-directory: editor/vscode

    - name: Upload VS Code extension artifact
      uses: actions/upload-artifact@v6
      with:
        name: vscode-extension-${{ matrix.build_type }}-${{ github.sha }}
        path: editor/vscode/*.vsix
        if-no-files-found: error
        retention-days: 30

    - name: Test
      run: npm test
      working-directory: bindings/node

    - name: Test CLI
      run: |
        node "${{ steps.strings.outputs.build_dir }}/npm/cowel.js" run \
          docs/index.cow \
          docs/actual.html &&
        diff --color=always -u \
          docs/index.html \
          docs/actual.html
