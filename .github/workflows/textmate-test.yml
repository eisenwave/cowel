name: TextMate Grammar Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - "editor/**"
      - ".github/workflows/textmate-test.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "editor/**"
      - ".github/workflows/textmate-test.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install
      working-directory: editor/vscode

    - name: Run TextMate grammar tests
      run: npm test
      working-directory: editor/vscode
